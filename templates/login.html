{% extends "base.html" %}
{% block title %}Login – Smart Study Planner{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Branding -->
        <div class="auth-brand">
            <span class="brand-icon">📚</span>
            <h1>Smart Study Planner</h1>
            <p>Welcome back! Sign in to continue.</p>
        </div>

        {% if error %}
        <div class="alert alert-error" role="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="auth-form" novalidate>
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-password-wrap">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    />
                    <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="togglePassword('password')">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p class="auth-switch">Don't have an account? <a href="/register">Register</a></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
